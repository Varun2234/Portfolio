<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a52;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGradient)"/>
  
  <!-- Glow effect -->
  <circle cx="200" cy="200" r="140" fill="url(#glowGradient)"/>
  
  <!-- Main avatar circle -->
  <circle cx="200" cy="200" r="130" fill="#1a2847" stroke="#00d4ff" stroke-width="4"/>
  
  <!-- Inner background -->
  <circle cx="200" cy="200" r="125" fill="#0d1f3c"/>
  
  <!-- Developer initials/symbol -->
  <g transform="translate(200, 200)">
    <!-- Code brackets <>/ -->
    <text x="0" y="20" font-size="80" font-weight="bold" text-anchor="middle" fill="#00d4ff" font-family="monospace">&lt;/&gt;</text>
    
    <!-- Glow text -->
    <text x="0" y="20" font-size="80" font-weight="bold" text-anchor="middle" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3" font-family="monospace" filter="blur(2px)">&lt;/&gt;</text>
  </g>
  
  <!-- Decorative elements around -->
  <!-- Top accent -->
  <circle cx="200" cy="70" r="6" fill="#00d4ff" opacity="0.8"/>
  <line x1="200" y1="76" x2="200" y2="90" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  
  <!-- Bottom accent -->
  <circle cx="200" cy="330" r="6" fill="#ff006e" opacity="0.8"/>
  <line x1="200" y1="324" x2="200" y2="310" stroke="#ff006e" stroke-width="2" opacity="0.6"/>
  
  <!-- Left accent -->
  <circle cx="70" cy="200" r="6" fill="#00d4ff" opacity="0.8"/>
  <line x1="76" y1="200" x2="90" y2="200" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  
  <!-- Right accent -->
  <circle cx="330" cy="200" r="6" fill="#ff006e" opacity="0.8"/>
  <line x1="324" y1="200" x2="310" y2="200" stroke="#ff006e" stroke-width="2" opacity="0.6"/>
  
  <!-- Outer glow ring -->
  <circle cx="200" cy="200" r="130" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="200" r="135" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
</svg>